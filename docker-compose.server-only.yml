services:

  # Utiliser ce fichier si vous avez déjà un MongoDB externe.
  # Mettez à jour DB_HOST (ou MONGODB_URI) dans votre .env.

  server:
    container_name: psdk_online_server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      # MongoDB — variables séparées ou URI complète
      - MONGODB_URI=${MONGODB_URI:-}
      - DB_NAME=${DB_NAME:-}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-27017}
      - DB_USER=${DB_USER:-}
      - DB_PSWD=${DB_PSWD:-}
      # Auth
      - API_KEY=${API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      # GTS
      - GTS_SPECIES_BLACKLIST=${GTS_SPECIES_BLACKLIST:-}
      - GTS_EXPIRY_DAYS=${GTS_EXPIRY_DAYS:-30}
      # PokeBank
      - POKEBANK_MAX_BOXES=${POKEBANK_MAX_BOXES:-8}
      - POKEBANK_BOX_SIZE=${POKEBANK_BOX_SIZE:-30}
    restart: on-failure:5
    volumes:
      - server_logs:/usr/src/app/logs

volumes:
  server_logs:
