services:

  # ── Application server ─────────────────────────────────────────────────────
  server:
    container_name: psdk_online_server
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - psdk_network
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      # MongoDB connection — assembled from individual variables in src/config/env.ts
      - DB_NAME=${DB_NAME}
      - DB_HOST=mongodb
      - DB_PORT=${DB_PORT:-27017}
      - DB_USER=${DB_USER}
      - DB_PSWD=${DB_PSWD}
      # Auth
      - API_KEY=${API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      # GTS
      - GTS_SPECIES_BLACKLIST=${GTS_SPECIES_BLACKLIST:-}
      - GTS_EXPIRY_DAYS=${GTS_EXPIRY_DAYS:-30}
      # PokeBank
      - POKEBANK_MAX_BOXES=${POKEBANK_MAX_BOXES:-8}
      - POKEBANK_BOX_SIZE=${POKEBANK_BOX_SIZE:-30}
    restart: on-failure:5
    volumes:
      - server_logs:/usr/src/app/logs
    depends_on:
      mongodb:
        condition: service_healthy

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    container_name: psdk_online_mongo
    build:
      context: .
      dockerfile: Dockerfile.mongodb
    networks:
      - psdk_network
    ports:
      - "27017:27017"
    environment:
      # Root admin credentials — used internally by MongoDB on first startup only.
      # The init script uses these to create the application user (DB_USER/DB_PSWD).
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
      # Application user — passed to init_mongo.sh via environment
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PSWD: ${DB_PSWD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "localhost:27017/admin"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

# ── Networks & Volumes ──────────────────────────────────────────────────────
networks:
  psdk_network:
    driver: bridge

volumes:
  mongo_data:
  server_logs:
